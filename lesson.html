<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="home.title">Rainy Night Frog — 免費語言學習工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Outfit:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body class="lc-app lc-lesson-page" data-i18n-page="lesson">
  <div class="lc-bg" aria-hidden="true"></div>
  <div class="lc-wrap">
    <header class="lc-header">
      <a class="lc-logo lc-logo-home" href="home.html" data-i18n="flow.navHome">首頁</a>
      <div class="lc-header-end">
        <div class="lc-score-pill" id="scoreDisplay" aria-live="polite">
          <span class="lc-score-badge" id="lessonScoreBadge" aria-hidden="true">⭐</span>
          <div class="lc-score-body">
            <span class="lc-score-label" data-i18n="flow.scoreCorrect">答對</span>
            <div class="lc-score-nums">
              <span class="lc-score-num" id="scoreNum">0</span>
              <span class="lc-score-slash">/</span>
              <span class="lc-score-total" id="scoreTotal">10</span>
            </div>
          </div>
          <div class="lc-energy-dots" id="energyDots" role="img" aria-label="5/5"></div>
        </div>
        <div id="langTriggerMount"></div>
      </div>
    </header>

    <div class="lc-progress-wrap">
      <div class="lc-progress"><div class="lc-progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <main class="lc-main" id="quizRoot"></main>

    <div class="lc-footer-bar">
      <button type="button" class="lc-btn-ghost" id="btnSkip" data-i18n="flow.skip">跳過</button>
      <button type="button" class="lc-btn-primary" id="btnAction" disabled data-i18n="flow.check">檢查</button>
    </div>
  </div>

  <script src="frog-logo-inline.js"></script>
  <script src="i18n.js"></script>
  <script src="player-auth.js"></script>
  <script src="app-settings.js"></script>
  <script src="app.js"></script>
  <script src="zh-vocab-extra.js"></script>
  <script src="zh-vocab-hard.js"></script>
  <script src="zh-literacy-bank.js"></script>
  <script src="en-literacy-bank.js"></script>
  <script src="mascot-pool.js"></script>
  <script src="question-generator.js?v=20260521"></script>
  <script src="questions.js?v=20260521"></script>
  <script src="question-audit.js"></script>
  <script src="quest-system.js"></script>
  <script src="path-progress.js"></script>
  <script src="adventure-island-progress.js"></script>
  <script src="leaderboard-data.js"></script>
  <script src="adventure-island.js"></script>
  <script src="shop-inventory.js"></script>
  <script src="practice-backpack.js?v=20260521"></script>
  <script src="practice-engine.js?v=20260521"></script>
  <script>
    var mode = "normal";
    var params = new URLSearchParams(location.search);
    if (params.get("mode") === "review") mode = "review";
    if (params.get("mode") === "jump") mode = "jump";
    if (params.get("mode") === "drill") mode = "drill";
    if (params.get("mode") === "challenge") mode = "challenge";
    if (params.get("mode") === "chest") mode = "chest";
    if (params.get("mode") === "bonus") mode = "bonus";
    if (params.get("mode") === "listen") mode = "listen";
    if (params.get("mode") === "match") mode = "match";
    if (params.get("mode") === "story") mode = "story";
    var hasPathLesson =
      params.has("node") ||
      params.has("stage") ||
      params.get("view") === "grade" ||
      (params.get("mode") && params.get("mode") !== "normal");
    if (window.RNFPathProgress) {
      if (!hasPathLesson && RNFPathProgress.clearLessonContext) {
        RNFPathProgress.clearLessonContext();
      }
      if (hasPathLesson && RNFPathProgress.bindLessonFromUrl) {
        RNFPathProgress.bindLessonFromUrl(params);
      }
    }
    var viewGrade = params.get("view") === "grade";

    AppI18n.applyPage("lesson");
    LCApp.initLangPopover("langTriggerMount");

    function updateLessonScoreBadge() {
      var el = document.getElementById("lessonScoreBadge");
      if (!el || !global.LCApp || !LCApp.courseMeta) return;
      el.textContent = LCApp.courseMeta(LCApp.getLearnTarget()).flag || "⭐";
    }
    updateLessonScoreBadge();

    var engine;

    function showLessonBootError(err) {
      var root = document.getElementById("quizRoot");
      if (!root) return;
      var msg = AppI18n.t("flow.lessonLoadError");
      root.innerHTML =
        '<div class="lc-complete"><p class="lc-quiz-q">' +
        msg +
        '</p><button type="button" class="lc-btn-primary lc-btn-block" onclick="location.reload()">' +
        AppI18n.t("flow.reloadPage") +
        "</button></div>";
      if (err && console.error) console.error(err);
    }

    function ensureQuizVisible() {
      var root = document.getElementById("quizRoot");
      if (!root || !engine) return false;
      if (root.querySelector(".lc-step, .lc-complete, .lc-grade-report")) return true;
      if (engine.state.queue && engine.state.queue.length) {
        try {
          engine.renderCurrent();
        } catch (e) {
          showLessonBootError(e);
          return false;
        }
      }
      return !!root.querySelector(".lc-step, .lc-complete");
    }

    function boot() {
      if (viewGrade) {
        LCApp.initScoreWidget(10);
        document.getElementById("btnSkip").classList.add("lc-hidden");
        document.getElementById("btnAction").classList.add("lc-hidden");
        RNFPractice.renderGradeFromStorage(document.getElementById("quizRoot"));
        document.title =
          (AppI18n.t("flow.reviewReport") || "Report") + "  · Rainy Night Frog";
        return;
      }
      if (!window.RNFQuestions || !RNFQuestions.buildSession) {
        showLessonBootError(new Error("RNFQuestions missing"));
        return;
      }
      if (!window.RNFPractice || !RNFPractice.PracticeEngine) {
        showLessonBootError(new Error("RNFPractice missing"));
        return;
      }
      try {
        if (window.RNFPathProgress && RNFPathProgress.clearLessonContext) {
          RNFPathProgress.clearLessonContext();
        }
        engine = new RNFPractice.PracticeEngine({
          root: document.getElementById("quizRoot"),
          mode: mode,
          onProgress: LCApp.setProgress,
          onScore: LCApp.updateScoreDisplay,
        });
        if (!engine.state.queue || !engine.state.queue.length) {
          showLessonBootError(new Error("empty queue"));
          return;
        }
        var lessonLives = engine.state.lives;
        LCApp.initScoreWidget(engine.state.queue.length, lessonLives);
        LCApp.updateScoreDisplay({
          correct: 0,
          total: engine.state.queue.length,
          lives: lessonLives,
        });
        if (!rootHasQuizMarkup()) {
          forceRenderQuiz();
        }
        if (!rootHasQuizMarkup()) {
          showLessonBootError(new Error("quiz not rendered"));
          return;
        }
        setTimeout(function () {
          if (window.RNFPracticeBackpack && RNFPracticeBackpack.init) {
            try {
              RNFPracticeBackpack.init(engine);
            } catch (bpErr) {
              if (console.warn) console.warn(bpErr);
            }
          }
        }, 0);
      } catch (err) {
        showLessonBootError(err);
      }
      if (mode === "review") {
        document.title =
          (AppI18n.t("flow.modeReviewTitle") || "Review") + "  · Rainy Night Frog";
      }
      if (mode === "jump") {
        var jumpPart = params.get("part") || sessionStorage.getItem("rnf_jump_test_part") || "";
        document.title =
          (AppI18n.t("flow.jumpTestStart") || "Jump test") +
          (jumpPart ? " · " + jumpPart : "") +
          "  · Rainy Night Frog";
      }
    }

    document.addEventListener("lc:langchange", function () {
      AppI18n.applyPage("lesson");
      updateLessonScoreBadge();
      if (engine) {
        LCApp.initScoreWidget(engine.state.queue.length, engine.state.lives);
        engine.refreshLocale();
      }
      if (params.get("audit") === "1" && window.RNFQuestionAudit) {
        RNFQuestionAudit.runAudit();
      }
    });

    try {
      if (!sessionStorage.getItem("learn_target")) {
        sessionStorage.setItem("learn_target", "en");
      }
    } catch (storeErr) {}

    try {
      boot();
    } catch (fatalErr) {
      showLessonBootError(fatalErr);
    }
  </script>
</body>
</html>
