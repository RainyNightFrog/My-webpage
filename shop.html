<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="flow.shopPageTitle">寶石小店 — Rainy Night Frog</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Outfit:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body class="lc-app lc-learn-page lc-shop-page" data-i18n-page="shop">
  <div class="lc-bg" aria-hidden="true"></div>

  <div class="lc-learn-shell">
    <nav class="lc-learn-nav" aria-label="Main">
      <a class="lc-learn-brand" href="home.html">
        <span class="lc-logo-icon" data-frog-logo aria-hidden="true"></span>
        <span class="lc-learn-brand-text" data-i18n="flow.brandName">Rainy Night Frog</span>
      </a>
      <ul class="lc-learn-menu">
        <li>
          <a class="lc-learn-link" href="learn.html">
            <span class="lc-learn-link-icon" aria-hidden="true">🏠</span>
            <span data-i18n="flow.navLearn">學習</span>
          </a>
        </li>
        <li>
          <a class="lc-learn-link" href="leaderboard.html">
            <span class="lc-learn-link-icon" aria-hidden="true">🛡️</span>
            <span data-i18n="flow.navLeaderboard">排行榜</span>
          </a>
        </li>
        <li>
          <a class="lc-learn-link" href="quests.html">
            <span class="lc-learn-link-icon lc-nav-chest-icon" aria-hidden="true"></span>
            <span data-i18n="flow.navQuests">特別任務</span>
          </a>
        </li>
        <li>
          <a class="lc-learn-link active" href="shop.html">
            <span class="lc-learn-link-icon" aria-hidden="true">💎</span>
            <span data-i18n="flow.navShop">寶石小店</span>
          </a>
        </li>
        <li>
          <a class="lc-learn-link" href="profile.html">
            <span class="lc-learn-link-icon" aria-hidden="true">🐸</span>
            <span data-i18n="flow.navProfile">個人檔案</span>
          </a>
        </li>
        <li class="lc-learn-more-wrap">
          <button type="button" class="lc-learn-link lc-learn-more-btn" data-nav-more aria-expanded="false" aria-haspopup="menu">
            <span class="lc-learn-link-icon lc-more-icon" aria-hidden="true">⋯</span>
            <span data-i18n="flow.navMore">更多</span>
          </button>
        </li>
      </ul>
    </nav>

    <div class="lc-learn-stage"><header class="lc-learn-topbar" aria-label="Status"><p class="lc-learn-topbar-course" data-learn-lang-label></p><div class="lc-learn-topbar-actions"><div id="learnStatsMount" class="lc-learn-stats-mount"></div><div id="langTriggerMount" class="lc-learn-lang-mount-top"></div></div></header>
      <div class="lc-learn-body lc-shop-body">
      <main class="lc-shop-main" id="shopMain"></main>
      <aside class="lc-shop-side" id="shopSide" aria-label="Sidebar"></aside>
    </div>
  </div>

  <script src="frog-logo-inline.js"></script>
  <script src="i18n.js"></script>
  <script src="avatar-pool.js"></script>
  <script src="player-auth.js"></script>
  <script src="app-settings.js"></script>
  <script src="app.js"></script>
  <script src="learn-chrome.js"></script>
  <script src="friends-system.js"></script>
  <script src="shop-inventory.js"></script>
  <script src="leaderboard-page.js"></script>
  <script src="shop-page.js"></script>
  <script>
    AppI18n.applyPage("shop");
    LCApp.initLearnChrome();
    LCApp.initMoreMenu();
    LCApp.initCoursePicker();
    LCApp.initStreakPicker();
    LCApp.initGemsPicker();
    LCApp.initHeartsPicker();
    RNFShop.init();
    document.addEventListener("lc:langchange", function () {
      AppI18n.applyPage("shop");
      LCApp.initMoreMenu();
      LCApp.initCoursePicker();
      LCApp.initStreakPicker();
    LCApp.initGemsPicker();
    LCApp.initHeartsPicker();
      RNFShop.init();
    });
    document.addEventListener("lc:coursechange", function () {
      RNFShop.init();
      LCApp.initCoursePicker();
      LCApp.initStreakPicker();
    LCApp.initGemsPicker();
    LCApp.initHeartsPicker();
    });
    document.addEventListener("lc:heartschange", function () {
      RNFShop.init();
      LCApp.initHeartsPicker();
    });
  </script>
</body>
</html>
